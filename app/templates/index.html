<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Heart Disease Prediction</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

<div class="container">

    <h1>❤️ Heart Disease Prediction System</h1>

    <p class="subtitle">
        <div class="navigation">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('about') }}">About Project</a>
</div>
        National College of Ireland<br>
        Cloud Machine Learning Project
    </p>

    <hr>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div>
                <label for="male">Gender</label>

                <select id="male" name="male" required>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div>
                <label for="age">Age</label>

                <input
                    type="number"
                    id="age"
                    name="age"
                    min="18"
                    max="100"
                    placeholder="Example: 55"
                    required
                >
            </div>

            <div>
                <label for="education">Education Level</label>

                <select id="education" name="education" required>
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="4">Level 4</option>
                </select>
            </div>

            <div>
                <label for="currentSmoker">Current Smoker</label>

                <select id="currentSmoker" name="currentSmoker" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="cigsPerDay">Cigarettes Per Day</label>

                <input
                    type="number"
                    id="cigsPerDay"
                    name="cigsPerDay"
                    min="0"
                    max="100"
                    value="0"
                    required
                >
            </div>

            <div>
                <label for="BPMeds">BP Medication</label>

                <select id="BPMeds" name="BPMeds" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="prevalentStroke">Previous Stroke</label>

                <select
                    id="prevalentStroke"
                    name="prevalentStroke"
                    required
                >
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="prevalentHyp">Hypertension</label>

                <select id="prevalentHyp" name="prevalentHyp" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="diabetes">Diabetes</label>

                <select id="diabetes" name="diabetes" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="totChol">Total Cholesterol (mg/dL)</label>

                <input
                    type="number"
                    id="totChol"
                    name="totChol"
                    min="100"
                    max="700"
                    placeholder="Example: 220"
                    required
                >
            </div>

            <div>
                <label for="sysBP">Systolic BP (mmHg)</label>

                <input
                    type="number"
                    id="sysBP"
                    name="sysBP"
                    min="70"
                    max="260"
                    placeholder="Example: 130"
                    required
                >
            </div>

            <div>
                <label for="diaBP">Diastolic BP (mmHg)</label>

                <input
                    type="number"
                    id="diaBP"
                    name="diaBP"
                    min="40"
                    max="160"
                    placeholder="Example: 80"
                    required
                >
            </div>

            <div>
                <label for="BMI">BMI (kg/m²)</label>

                <input
                    type="number"
                    id="BMI"
                    name="BMI"
                    min="10"
                    max="70"
                    step="0.1"
                    placeholder="Example: 25.5"
                    required
                >
            </div>

            <div>
                <label for="heartRate">Heart Rate (bpm)</label>

                <input
                    type="number"
                    id="heartRate"
                    name="heartRate"
                    min="30"
                    max="220"
                    placeholder="Example: 75"
                    required
                >
            </div>

            <div>
                <label for="glucose">Glucose (mg/dL)</label>

                <input
                    type="number"
                    id="glucose"
                    name="glucose"
                    min="40"
                    max="500"
                    placeholder="Example: 90"
                    required
                >
            </div>

        </div>

        <button type="submit">
            Predict Heart Disease Risk
        </button>

    </form>

    <p class="form-disclaimer">
        This system is intended for academic and educational purposes only.
        It does not provide a medical diagnosis.
    </p>

</div>

</body>

</html>
