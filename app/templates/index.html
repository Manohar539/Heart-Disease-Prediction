<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<div class="container">

    <h1>❤️ Heart Disease Prediction System</h1>
    <p class="subtitle">
        National College of Ireland<br>
        Cloud Machine Learning Project
    </p>

    <hr>

    <form action="/predict" method="POST">
        <div class="form-grid">

            <div>
                <label>Gender</label>
                <select name="male" required>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div>
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div>
                <label>Education Level</label>
                <select name="education" required>
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="4">Level 4</option>
                </select>
            </div>

            <div>
                <label>Current Smoker</label>
                <select name="currentSmoker" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div>
                <label>Cigarettes Per Day</label>
                <input type="number" name="cigsPerDay" value="0" required>
            </div>

            <div>
                <label>BP Medication</label>
                <select name="BPMeds" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label>Previous Stroke</label>
                <select name="prevalentStroke" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label>Hypertension</label>
                <select name="prevalentHyp" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label>Diabetes</label>
                <select name="diabetes" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label>Total Cholesterol</label>
                <input type="number" name="totChol" required>
            </div>

            <div>
                <label>Systolic BP</label>
                <input type="number" name="sysBP" required>
            </div>

            <div>
                <label>Diastolic BP</label>
                <input type="number" name="diaBP" required>
            </div>

            <div>
                <label>BMI</label>
                <input type="number" step="0.1" name="BMI" required>
            </div>

            <div>
                <label>Heart Rate</label>
                <input type="number" name="heartRate" required>
            </div>

            <div>
                <label>Glucose</label>
                <input type="number" name="glucose" required>
            </div>

        </div>

        <button type="submit">Predict Heart Disease Risk</button>
    </form>

</div>
</body>
</html>
