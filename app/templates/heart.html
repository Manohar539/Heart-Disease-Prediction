<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Heart Disease Detection</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

<div class="container">

    <h1>❤️ Heart Disease Detection</h1>

    <p class="subtitle">
        Heart Dataset Prediction Module<br>
        XGBoost Classification Model
    </p>

    <div class="navigation">
        <a href="{{ url_for('home') }}">Framingham</a>
        <a href="{{ url_for('heart_page') }}">Heart Dataset</a>
        <a href="{{ url_for('heart_failure_page') }}">Heart Failure</a>
        <a href="{{ url_for('comparison_page') }}">Comparison</a>
        <a href="{{ url_for('about') }}">About</a>
    </div>

    <hr>

    <form action="/predict-heart" method="POST">

        <div class="form-grid">

            <div>
                <label for="age">Age</label>
                <input
                    type="number"
                    id="age"
                    name="age"
                    min="18"
                    max="100"
                    placeholder="Example: 55"
                    required
                >
            </div>

            <div>
                <label for="sex">Sex</label>
                <select id="sex" name="sex" required>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div>
                <label for="dataset">Dataset Source</label>
                <select id="dataset" name="dataset" required>
                    <option value="0">Cleveland</option>
                    <option value="1">Hungary</option>
                    <option value="2">Switzerland</option>
                    <option value="3">VA Long Beach</option>
                </select>
            </div>

            <div>
                <label for="cp">Chest Pain Type</label>
                <select id="cp" name="cp" required>
                    <option value="0">Asymptomatic</option>
                    <option value="1">Atypical Angina</option>
                    <option value="2">Non-anginal Pain</option>
                    <option value="3">Typical Angina</option>
                </select>
            </div>

            <div>
                <label for="trestbps">
                    Resting Blood Pressure (mmHg)
                </label>
                <input
                    type="number"
                    id="trestbps"
                    name="trestbps"
                    min="70"
                    max="260"
                    placeholder="Example: 130"
                    required
                >
            </div>

            <div>
                <label for="chol">Cholesterol (mg/dL)</label>
                <input
                    type="number"
                    id="chol"
                    name="chol"
                    min="80"
                    max="700"
                    placeholder="Example: 220"
                    required
                >
            </div>

            <div>
                <label for="fbs">
                    Fasting Blood Sugar Above 120 mg/dL
                </label>
                <select id="fbs" name="fbs" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="restecg">Resting ECG</label>
                <select id="restecg" name="restecg" required>
                    <option value="0">Left Ventricular Hypertrophy</option>
                    <option value="1">Normal</option>
                    <option value="2">ST-T Abnormality</option>
                </select>
            </div>

            <div>
                <label for="thalch">Maximum Heart Rate</label>
                <input
                    type="number"
                    id="thalch"
                    name="thalch"
                    min="40"
                    max="230"
                    placeholder="Example: 150"
                    required
                >
            </div>

            <div>
                <label for="exang">Exercise-Induced Angina</label>
                <select id="exang" name="exang" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div>
                <label for="oldpeak">ST Depression</label>
                <input
                    type="number"
                    id="oldpeak"
                    name="oldpeak"
                    min="-3"
                    max="10"
                    step="0.1"
                    placeholder="Example: 1.2"
                    required
                >
            </div>

            <div>
                <label for="slope">ST Segment Slope</label>
                <select id="slope" name="slope" required>
                    <option value="0">Downsloping</option>
                    <option value="1">Flat</option>
                    <option value="2">Upsloping</option>
                </select>
            </div>

        </div>

        <button type="submit">
            Detect Heart Disease
        </button>

    </form>

    <p class="form-disclaimer">
        This prediction module is intended for academic and educational
        purposes only. It does not provide a medical diagnosis.
    </p>

</div>

</body>

</html>
